# Artifact-only public stack. Generate .env.stack from stack-manifest.json with
# `python scripts/render_stack_env.py --manifest stack-manifest.json`.

x-service: &service
  image: ${MARTY_SERVICES_IMAGE:?run scripts/render_stack_env.py first}
  restart: "no"
  environment: &service-env
    DATABASE_URL: postgresql+asyncpg://marty:marty_oss_ci_2026@postgres:5432/marty_credentials
    REDIS_URL: redis://redis:6379
  depends_on:
    migrations:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
  networks: [marty-oss]

services:
  postgres:
    image: ${POSTGRES_IMAGE:?run scripts/render_stack_env.py first}
    environment:
      POSTGRES_USER: marty
      # Ephemeral public-CI credential; never used outside this disposable stack.
      POSTGRES_PASSWORD: marty_oss_ci_2026
      POSTGRES_DB: marty_credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marty -d marty_credentials"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [marty-oss]

  redis:
    image: ${REDIS_IMAGE:?run scripts/render_stack_env.py first}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [marty-oss]

  migrations:
    image: ${MARTY_MIGRATIONS_IMAGE:?run scripts/render_stack_env.py first}
    environment:
      DATABASE_URL: postgresql://marty:marty_oss_ci_2026@postgres:5432/marty_credentials
      MARTY_DB_PASSWORD: marty_oss_ci_2026
      MARTY_ORG_ADMIN_EMAIL: oss-ci@elevenid.dev
      PUBLIC_API_URL: https://oss-ci.elevenid.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks: [marty-oss]

  auth-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: auth
      SERVICE_PORT: "8001"
      KEYCLOAK_REALM: oss-ci
      OIDC_ISSUER_URL: https://oss-ci.invalid/realms/oss-ci
      OIDC_EXTERNAL_ISSUER_URL: https://oss-ci.invalid/realms/oss-ci
      UI_BASE_URL: http://ui
      COOKIE_SECURE: "false"

  organization-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: organization
      SERVICE_PORT: "8002"

  credential-template-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: credential_template
      SERVICE_PORT: "8003"

  trust-profile-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: trust_profile
      SERVICE_PORT: "8004"

  issuance-service:
    image: ${MARTY_ISSUANCE_IMAGE:?run scripts/render_stack_env.py first}
    environment:
      DATABASE_URL: postgresql+asyncpg://marty:marty_oss_ci_2026@postgres:5432/marty_credentials
      REDIS_URL: redis://redis:6379
      # The issuer URL is a public protocol value, not an internal service URL.
      # Local CI defaults to the Compose gateway; an official conformance run
      # supplies the externally reachable gateway address.
      ISSUER_BASE_URL: ${ISSUER_BASE_URL:-http://gateway:8000}
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template-service:8003
      REVOCATION_PROFILE_SERVICE_URL: http://revocation-profile-service:8013
      TOKEN_HMAC_KEY: test-only-token-hmac-key-32-bytes
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks: [marty-oss]

  compliance-profile-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: compliance_profile
      SERVICE_PORT: "8008"

  presentation-policy-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: presentation_policy
      SERVICE_PORT: "8009"

  deployment-profile-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: deployment_profile
      SERVICE_PORT: "8010"

  flow-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: flow
      SERVICE_PORT: "8011"

  revocation-profile-service:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: revocation_profile
      SERVICE_PORT: "8013"

  gateway:
    <<: *service
    environment:
      <<: *service-env
      SERVICE_NAME: gateway
      SERVICE_PORT: "8000"
      AUTH_SERVICE_URL: http://auth-service:8001
      ORGANIZATION_SERVICE_URL: http://organization-service:8002
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template-service:8003
      TRUST_PROFILE_SERVICE_URL: http://trust-profile-service:8004
      ISSUANCE_SERVICE_URL: http://issuance-service:8005
      COMPLIANCE_PROFILE_SERVICE_URL: http://compliance-profile-service:8008
      PRESENTATION_POLICY_SERVICE_URL: http://presentation-policy-service:8009
      DEPLOYMENT_PROFILE_SERVICE_URL: http://deployment-profile-service:8010
      FLOW_SERVICE_URL: http://flow-service:8011
      REVOCATION_PROFILE_SERVICE_URL: http://revocation-profile-service:8013
    ports: ["28000:8000"]

  ui:
    image: ${MARTY_UI_IMAGE:?run scripts/render_stack_env.py first}
    ports: ["23000:80"]
    depends_on: [gateway]
    networks: [marty-oss]

  # Opt-in TLS boundary used by the official OIDF conformance suite. Production
  # deployments terminate TLS outside this Compose file; this profile makes the
  # local certification path exercise the same HTTPS metadata and endpoints.
  tls-proxy:
    profiles: [oidf]
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports: ["28443:443"]
    volumes:
      - ./services/tls-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_DIR:-./conformance/local-certs}:/etc/nginx/certs:ro
    depends_on: [gateway]
    networks: [marty-oss]

networks:
  marty-oss:
    driver: bridge
