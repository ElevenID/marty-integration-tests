# Standalone, production-boundary EUDI reference interoperability services.
#
# Start Marty first with docker-compose.profile.oidf.yml.  That profile exposes
# only oidf-tls-proxy on ${MARTY_CONFORMANCE_PROJECT}_oidf-runner.  This
# independent Compose project joins the bridge only for the official wallet
# tester, so neither reference implementation can reach Marty's databases,
# Keycloak HTTP port, signing service, or internal APIs.
#
# Example:
#   docker compose -p eudi-reference \
#     -f conformance/eudi-reference.compose.yml up -d

services:
  eudi-wallet-tester:
    image: ghcr.io/eu-digital-identity-wallet/eudi-app-web-wallet-tester-py@sha256:d2978c7a9bb29b00f8c202d054b8a9a4ec8e9addf2e16314f3ed06426aef19be
    environment:
      FLASK_RUN_PORT: "5000"
      # The upstream tester concatenates path segments, so the public origin
      # must end in exactly one slash. Supply OIDF_PUBLIC_BASE_URL without it.
      serv_url: ${OIDF_PUBLIC_BASE_URL:?set the Marty HTTPS origin without a trailing slash}/
      service_url: ${EUDI_WALLET_TESTER_PUBLIC_URL:?set the wallet tester HTTPS URL}
      REQUESTS_CA_BUNDLE: /certs/tls.crt
    volumes:
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/certs:ro
    networks: [default, marty_oidf_bridge]
    restart: "no"

  eudi-wallet-tester-tls:
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${EUDI_WALLET_TESTER_TLS_HOST_PORT:-25051}:443"
    volumes:
      - ./eudi-reference/wallet-tester.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/etc/nginx/certs:ro
    depends_on:
      eudi-wallet-tester:
        condition: service_started
    restart: "no"

  eudi-verifier:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint@sha256:0687ad0bf9c315d64d7cdae1751c8795c2410848f2299adeaaf1c39305366711
    environment:
      SERVER_PORT: "8080"
      VERIFIER_PUBLICURL: ${EUDI_VERIFIER_PUBLIC_URL:?set the verifier HTTPS URL}
      VERIFIER_REQUESTJWT_EMBED: "ByReference"
      VERIFIER_DEFEAULTHTTPRESPONSEMODE: "DirectPost"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: file:///certs/keystore.jks
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_TYPE: ${EUDI_VERIFIER_KEYSTORE_TYPE:-jks}
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_PASSWORD: ${EUDI_VERIFIER_KEYSTORE_PASSWORD:?set the disposable verifier keystore password}
      VERIFIER_ACCESS_CERTIFICATE_ALIAS: ${EUDI_VERIFIER_KEYSTORE_ALIAS:?set the disposable verifier key alias}
      VERIFIER_ACCESS_CERTIFICATE_PASSWORD: ${EUDI_VERIFIER_KEY_PASSWORD:?set the disposable verifier key password}
    volumes:
      - ${EUDI_VERIFIER_KEYSTORE_FILE:?set the disposable verifier keystore}:/certs/keystore.jks:ro
    restart: "no"

  eudi-verifier-tls:
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${EUDI_VERIFIER_TLS_HOST_PORT:-28091}:443"
    volumes:
      - ./eudi-reference/verifier.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/etc/nginx/certs:ro
    depends_on:
      eudi-verifier:
        condition: service_started
    restart: "no"

  # This is an ElevenID test facade around the pinned official EUDI Wallet Kit
  # libraries. It is separate from Marty and reaches it only via the same
  # public TLS bridge used by the upstream wallet tester.
  eudi-wallet-kit:
    build:
      context: ../services/eudi-wallet-harness
    ports:
      - "${EUDI_WALLET_KIT_HOST_PORT:-29090}:9090"
    volumes:
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/certs:ro
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/certs/truststore.jks
        -Djavax.net.ssl.trustStorePassword=${EUDI_TLS_TRUSTSTORE_PASSWORD:-conformance-changeit}
    networks: [default, marty_oidf_bridge]
    restart: "no"

networks:
  marty_oidf_bridge:
    name: ${OIDF_MARTY_BRIDGE_NETWORK:?set to <MARTY_CONFORMANCE_PROJECT>_oidf-runner}
    external: true
