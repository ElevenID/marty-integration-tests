# Standalone, production-boundary EUDI reference interoperability services.
#
# Start Marty first with docker-compose.profile.oidf.yml.  That profile exposes
# only oidf-tls-proxy on ${MARTY_CONFORMANCE_PROJECT}_oidf-runner.  This
# independent Compose project joins that bridge only through a byte-forwarding
# sidecar. Wallets stay on their own network and can reach Marty only at the
# exact public TLS hostname and port; neither reference implementation can
# reach Marty's databases, Keycloak HTTP port, signing service, or internal APIs.
#
# Example:
#   docker compose -p eudi-reference \
#     -f conformance/eudi-reference.compose.yml up -d

services:
  # Preserve the exact public Marty origin inside Docker. Publishing
  # ${OIDF_TLS_HOST_PORT} on the host does not make that port exist on the
  # tls-proxy container, which listens on 443. This byte-for-byte TCP bridge
  # gives wallets the public hostname and port without rewriting requests or
  # terminating TLS. It is the only EUDI service attached to Marty's external
  # OIDF runner network.
  eudi-marty-public-port-bridge:
    image: docker.io/alpine/socat:1.8.0.3@sha256:a26f4bcee25ad4a4096ce91e596c0a2fffcbb51f7fd198dd87a5c86eae66f0e1
    command:
      - TCP-LISTEN:${OIDF_TLS_HOST_PORT:?set the Marty public TLS port},fork,reuseaddr
      - TCP:oidf-tls-proxy:443
    networks:
      marty_public_url:
        aliases:
          - ${OIDF_CONFORMANCE_BRIDGE_ALIAS:?set the hostname from OIDF_PUBLIC_BASE_URL}
      marty_oidf_bridge: {}
    restart: "no"

  eudi-wallet-tester:
    image: ghcr.io/eu-digital-identity-wallet/eudi-app-web-wallet-tester-py@sha256:d2978c7a9bb29b00f8c202d054b8a9a4ec8e9addf2e16314f3ed06426aef19be
    environment:
      FLASK_RUN_PORT: "5000"
      # The upstream tester concatenates path segments, so the public origin
      # must end in exactly one slash. Supply OIDF_PUBLIC_BASE_URL without it.
      serv_url: ${OIDF_PUBLIC_BASE_URL:?set the Marty HTTPS origin without a trailing slash}/
      service_url: ${EUDI_WALLET_TESTER_PUBLIC_URL:?set the wallet tester HTTPS origin without a trailing slash}/
      # Trust the disposable root explicitly. The TLS leaf is deliberately not
      # treated as a trust anchor, matching a production certificate chain.
      REQUESTS_CA_BUNDLE: /certs/root-ca.pem
    volumes:
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/certs:ro
    networks: [default, marty_public_url]
    depends_on:
      eudi-marty-public-port-bridge:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=4).read(1)"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    restart: "no"

  eudi-wallet-tester-tls:
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${EUDI_WALLET_TESTER_TLS_HOST_PORT:-25051}:443"
    volumes:
      - type: bind
        source: ${EUDI_CONFORMANCE_CONFIG_ROOT:-./eudi-reference}/wallet-tester.nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/etc/nginx/certs:ro
    depends_on:
      eudi-wallet-tester:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: "no"

  eudi-verifier:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint@sha256:0687ad0bf9c315d64d7cdae1751c8795c2410848f2299adeaaf1c39305366711
    environment:
      SERVER_PORT: "8080"
      VERIFIER_PUBLICURL: ${EUDI_VERIFIER_PUBLIC_URL:?set the verifier HTTPS URL}
      VERIFIER_REQUESTJWT_EMBED: "ByReference"
      VERIFIER_DEFAULTHTTPRESPONSEMODE: "DirectPost"
      VERIFIER_CLIENTIDPREFIX: ${EUDI_VERIFIER_CLIENT_ID_PREFIX:-x509_san_dns}
      VERIFIER_ORIGINALCLIENTID: ${EUDI_VERIFIER_ORIGINAL_CLIENT_ID:?set the DNS identity in the verifier certificate}
      VERIFIER_ACCESS_CERTIFICATE_SIGNING_ALGORITHM: ${EUDI_VERIFIER_SIGNING_ALGORITHM:-ES512}
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: file:///certs/keystore.jks
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_TYPE: ${EUDI_VERIFIER_KEYSTORE_TYPE:-jks}
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_PASSWORD: ${EUDI_VERIFIER_KEYSTORE_PASSWORD:?set the disposable verifier keystore password}
      VERIFIER_ACCESS_CERTIFICATE_ALIAS: ${EUDI_VERIFIER_KEYSTORE_ALIAS:?set the disposable verifier key alias}
      VERIFIER_ACCESS_CERTIFICATE_PASSWORD: ${EUDI_VERIFIER_KEY_PASSWORD:?set the disposable verifier key password}
    volumes:
      - ${EUDI_VERIFIER_KEYSTORE_FILE:?set the disposable verifier keystore}:/certs/keystore.jks:ro
    restart: "no"

  eudi-verifier-tls:
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${EUDI_VERIFIER_TLS_HOST_PORT:-28091}:443"
    volumes:
      - type: bind
        source: ${EUDI_CONFORMANCE_CONFIG_ROOT:-./eudi-reference}/verifier.nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/etc/nginx/certs:ro
    depends_on:
      eudi-verifier:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: "no"

  # This is an ElevenID test facade around the pinned official EUDI Wallet Kit
  # libraries. It is separate from Marty and reaches it only via the same
  # public TLS bridge used by the upstream wallet tester.
  eudi-wallet-kit:
    build:
      context: ../services/eudi-wallet-harness
    ports:
      - "${EUDI_WALLET_KIT_HOST_PORT:-29090}:9090"
    volumes:
      - ${OIDF_TLS_CERT_DIR:?set a directory containing tls.crt and tls.key}:/certs:ro
      - ${EUDI_OID4VP_TRUST_ANCHOR_FILE:?set the OID4VP request-object trust-anchor PEM file}:/oid4vp-trust/anchors.pem:ro
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/certs/truststore.jks
        -Djavax.net.ssl.trustStoreType=JKS
        -Djavax.net.ssl.trustStorePassword=${EUDI_TLS_TRUSTSTORE_PASSWORD:-conformance-changeit}
      # OID4VP request-object PKIX trust is deliberately independent from TLS
      # trust. The host file is mounted read-only to avoid multiline secret
      # interpolation and may contain more than one approved CA certificate.
      EUDI_OID4VP_TRUST_ANCHOR_FILE: /oid4vp-trust/anchors.pem
    networks: [default, marty_public_url]
    depends_on:
      eudi-marty-public-port-bridge:
        condition: service_started
    restart: "no"

networks:
  marty_public_url:
    internal: true
  marty_oidf_bridge:
    name: ${OIDF_MARTY_BRIDGE_NETWORK:?set to <MARTY_CONFORMANCE_PROJECT>_oidf-runner}
    external: true
