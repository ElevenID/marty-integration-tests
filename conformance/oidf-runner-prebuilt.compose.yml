# Immutable image overrides for the official OIDF release-v5.2.0 runner.
#
# The upstream docker-compose-prebuilt.yml defaults to mutable `latest` tags.
# This overlay is deliberately separate so its image digests can be updated in
# the same reviewed change as conformance/oidf-runner.json.
services:
  server:
    image: registry.gitlab.com/openid/conformance-suite@sha256:6aa426aa1554f787b4a6259a556d2e33c18f2efc6a48cc5e1818b1818ac79485
  nginx:
    image: registry.gitlab.com/openid/conformance-suite/nginx@sha256:1432b2e69b49800081448078d8ab5ae1198f19e12674be211f1723d201ce9a01
