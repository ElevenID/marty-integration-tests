server {
    listen 443 ssl;
    server_name gateway-tls;

    # Docker service IPs change on recreate/rolling deployment. Resolve the
    # service name at request time instead of retaining nginx's startup-time
    # address, so the TLS boundary follows the current gateway container.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream gateway;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # OIDF/FAPI BCP 195 profile: do not inherit nginx's broad TLS 1.2 cipher
    # suite. In particular, CBC/SHA-1 suites must never be negotiated by the
    # public issuer boundary.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # Forward all requests to the HTTP gateway
    location / {
        proxy_pass http://$gateway_upstream:8000;
        # $http_host preserves a non-default public port. OID4VCI DPoP
        # proofs bind to the complete external target URI, including it.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
