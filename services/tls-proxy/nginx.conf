server {
    listen 443 ssl;
    server_name gateway-tls;

    # Docker service IPs change on recreate/rolling deployment. Resolve the
    # service name at request time instead of retaining nginx's startup-time
    # address, so the TLS boundary follows the current gateway container.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream gateway;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Forward all requests to the HTTP gateway
    location / {
        proxy_pass http://$gateway_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
