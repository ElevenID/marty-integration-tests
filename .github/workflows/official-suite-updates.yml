name: Official interoperability suite updates

on:
  schedule:
    - cron: "31 5 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: official-suite-updates
  cancel-in-progress: false

jobs:
  review-upstream-drift:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Detect upstream drift
        id: drift
        run: |
          if python scripts/official_suite_updates.py --write; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            status=$?
            if [ "$status" -ne 3 ]; then exit "$status"; fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open review PR
        if: steps.drift.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/official-suite-updates"
          title="chore: review official interoperability suite updates"
          body="Upstream drift was detected. Review the recorded revisions, update immutable pins and image digests intentionally, then run the affected official suites before merging. This bot never changes pins or merges the PR."
          git config user.name "elevenid-automation[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add conformance/upstream-review.json
          git commit -m "chore: review official suite upstream updates"
          git push --force-with-lease origin "$branch"
          existing_pr="$(gh pr list --state open --head "$branch" --json number,isDraft --jq 'map(select(.isDraft)) | .[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "$title" --body "$body"
          else
            gh pr create --draft --base main --head "$branch" --title "$title" --body "$body"
          fi
