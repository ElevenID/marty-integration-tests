name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      # Pull-request validation is hermetic and secretless. Full-stack tests
      # are run by the marty-ui release workflow from its attested manifest and
      # digest-pinned public artifacts.
      - name: Run hermetic unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Validate changed integration contracts
        run: |
          pytest \
            tests/integration/test_oid4vci_issuer_conformance.py \
            tests/integration/gateway/test_deployment_profile_flow.py \
            --collect-only -q
