name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Start services
        run: |
          docker compose up -d
          docker compose ps

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until docker compose exec -T gateway curl -f http://localhost:8000/health; do sleep 2; done'

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Show service logs on failure
        if: failure()
        run: |
          docker compose logs

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
