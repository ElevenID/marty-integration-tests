name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      # The full Docker stack depends on private sibling repositories that are
      # intentionally not accessible to a repository-scoped pull-request token.
      # Keep PR validation hermetic; full-stack runs are performed from the
      # provisioned multi-repository workspace.
      - name: Run hermetic unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Validate changed integration contracts
        run: |
          pytest \
            tests/integration/test_oid4vci_issuer_conformance.py \
            tests/integration/gateway/test_deployment_profile_flow.py \
            --collect-only -q
