name: Release OSS integration suite

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
      - name: Reject any existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/check_release_absent.py --repository "$GITHUB_REPOSITORY" --tag "$GITHUB_REF_NAME"
      - name: Validate version and test the public suite
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          actual="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          test "$version" = "$actual"
          python -m pip install --disable-pip-version-check build ".[dev]"
          pytest tests/unit -v
          python -m build
      - name: Collect versioned release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir release-assets
          cp dist/* release-assets/
          git archive --format=tar.gz \
            --prefix="marty-integration-tests-${version}/" \
            --output="release-assets/marty-integration-tests-${version}-source.tar.gz" \
            HEAD
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: release-assets/marty-integration-tests.spdx.json
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Sign and checksum release artifacts
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f ! -name '*.sigstore.json' -print0 | while IFS= read -r -d '' file; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
          (
            cd release-assets
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > ../SHA256SUMS
            mv ../SHA256SUMS SHA256SUMS
            cosign sign-blob --yes --bundle SHA256SUMS.sigstore.json SHA256SUMS
          )
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: release-assets/**
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          generate_release_notes: true
          files: release-assets/**
          draft: true
          overwrite_files: false
      - name: Publish complete immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
