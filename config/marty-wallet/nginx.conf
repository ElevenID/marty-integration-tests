server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # CORS — needed for postMessage tests and XHR from Playwright
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # Allow Playwright to embed the app in an iframe
    add_header 'X-Frame-Options' 'ALLOWALL' always;
    add_header 'Content-Security-Policy' "frame-ancestors *;" always;

    # Proxy API calls to the gateway so Flutter web app avoids CORS restrictions.
    # The Flutter test build makes fetch() calls to the same origin it was
    # loaded from, so these paths are forwarded to the real gateway service.
    # host.docker.internal resolves to the host machine on Docker Desktop (macOS/Windows).
    location /v1/ {
        proxy_pass http://host.docker.internal:8000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/ {
        proxy_pass http://host.docker.internal:8000/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        proxy_pass http://host.docker.internal:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint (used by Docker healthcheck and marty_wallet_url fixture)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
